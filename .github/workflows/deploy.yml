name: CI + Deploy

# Tests run on every push / PR to main. A green test run on a push to main (or a
# manual dispatch from main) then deploys to fly.io. The app runs a single
# always-on machine (in-process matchmaking), so deploy with --ha=false.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Nightly: run the slow full-Netcode check (the tla-full job gates on this).
  schedule:
    - cron: "0 7 * * *"

# Pin the Apalache release the TLA+ jobs install (Java is preinstalled on the GH
# ubuntu runners). Bump together with the local /tmp/apalache-* the docs reference.
env:
  APALACHE_VERSION: "0.58.0"

jobs:
  test:
    name: Test (cargo test --workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo test
        working-directory: rust
        run: cargo test --workspace --locked

  clippy:
    name: Clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

  tla:
    name: TLA+ model checks (Apalache, fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Apalache ${{ env.APALACHE_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL -o apalache.tgz \
            "https://github.com/apalache-mc/apalache/releases/download/v${APALACHE_VERSION}/apalache-${APALACHE_VERSION}.tgz"
          tar -xzf apalache.tgz
          echo "APALACHE_MC=$PWD/apalache-${APALACHE_VERSION}/bin/apalache-mc" >> "$GITHUB_ENV"
      # NOTE: the install step exported APALACHE_MC via $GITHUB_ENV, so it is already
      # in the environment of every later step's shell. We must NOT re-declare it as a
      # step-level `env:` mapping — `${{ env.APALACHE_MC }}` is evaluated from the job's
      # env context (computed before this job's steps run, where APALACHE_MC is unset),
      # so that would shadow the real path with an empty string. Just read $APALACHE_MC.
      - name: Model checks (assert the expected outcome of each)
        working-directory: tla
        run: bash ci-check.sh
      - name: Trace fixtures are not stale
        working-directory: tla
        run: bash regen-traces.sh --check

  # The FULL all-fixed Netcode check is ~6.5 min — too slow for the default PR path.
  # It runs on a manual dispatch or the nightly schedule only, NEVER gating a PR/deploy.
  tla-full:
    name: TLA+ full Netcode check (slow; dispatch/schedule only)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Apalache ${{ env.APALACHE_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL -o apalache.tgz \
            "https://github.com/apalache-mc/apalache/releases/download/v${APALACHE_VERSION}/apalache-${APALACHE_VERSION}.tgz"
          tar -xzf apalache.tgz
          echo "APALACHE_MC=$PWD/apalache-${APALACHE_VERSION}/bin/apalache-mc" >> "$GITHUB_ENV"
      - name: Netcode all-fixed (AllSafe holds, length 14)
        working-directory: tla
        run: |
          set -euo pipefail
          out="$("$APALACHE_MC" check --length=14 --config=Netcode.cfg Netcode.tla 2>&1)" || true
          echo "$out" | tail -5
          echo "$out" | grep -q "The outcome is: NoError" \
            || { echo "EXPECTED NoError from the all-fixed Netcode check"; exit 1; }

  deploy:
    name: Deploy to fly.io
    needs: [test, clippy, tla]
    # Only on a real push or manual dispatch to main — never on PRs (which may come
    # from forks and must not touch production or see secrets) and never on the
    # nightly schedule (which exists only to run the slow tla-full check).
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize deploys so two pushes can't race the single machine.
    concurrency: deploy-battletris
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy
        working-directory: rust
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # Stamp the build with the commit so recordings carry a real engine_sha.
        # NOTE: once the drain endpoints (this PR's server) are LIVE and the
        # BT_ADMIN_TOKEN secrets are set, switch this step to `./deploy-quiesce.sh`
        # (quiesce-in-place) so deploys stop severing live games. See that script.
        run: flyctl deploy --remote-only --ha=false --build-arg BT_GIT_SHA="${GITHUB_SHA::7}"
      - name: flyctl deploy bots
        working-directory: rust
        env:
          # A separate app-scoped deploy token: FLY_API_TOKEN is scoped to the
          # battletris app only and gets `unauthorized` for battletris-bots.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BOTS }}
        # The bots are CLIENTS of the wire protocol and the keyframe codec, so they
        # must ship with every server deploy. Leaving them behind is how the
        # KEYFRAME_VERSION 1->2 bump stranded the June 7 bot fleet: they rejected
        # every new keyframe, their local sims never entered the bazaar, they never
        # sent LeaveBazaar, and human opponents froze at the bazaar barrier.
        # Replacing the bot machines also forfeits any bout they are mid-game in
        # (a dropped bot forfeits at once), which is the intended cleanup for
        # matches stranded by a stale fleet.
        run: flyctl deploy -a battletris-bots -c fly.bots.toml --remote-only
