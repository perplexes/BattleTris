<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleTris - Replay Library</title>
    <script>
      window.sentryOnLoad = function () {
        Sentry.init({ sendDefaultPii: true });
      };
    </script>
    <script src="https://js.sentry-cdn.com/9045832ee730ae053d8a3fc0ea812e0c.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="motif.css">
</head>
<body>
    <div class="container">
        <div class="title-wrap">
            <img src="assets/bttitle.png" alt="BattleTris" class="title-img">
        </div>

        <div class="library-wrap">
            <h2 class="library-title">Replay Library</h2>
            <div id="libraryStatus" class="library-status">Loading&hellip;</div>
            <div id="libraryList" class="library-list"></div>
            <div class="replay-foot"><a href="/www/">&larr; Back to BattleTris</a></div>
        </div>
    </div>
    <script type="module" src="motif-scroll.js"></script>

    <script type="module" src="library.js"></script>
</body>
</html>
