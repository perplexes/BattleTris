<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleTris - Replay</title>
    <script>
      window.sentryOnLoad = function () {
        Sentry.init({ sendDefaultPii: true });
      };
    </script>
    <script src="https://js.sentry-cdn.com/9045832ee730ae053d8a3fc0ea812e0c.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="motif.css">
</head>
<body>
    <div class="container">
        <div class="title-wrap">
            <img src="assets/bttitle.png" alt="BattleTris" class="title-img">
        </div>

        <div class="replay-wrap">
            <div id="replayError" class="replay-error" style="display:none;"></div>

            <div class="replay-boards" id="replayBoards">
                <div class="replay-col">
                    <div class="replay-board-label" id="replayLabelA">Player</div>
                    <div class="replay-col-body">
                        <div class="replay-board-wrap">
                            <canvas id="replayCanvas"></canvas>
                            <div class="replay-bazaar-badge" id="replayBazaarA" style="display:none;">&#127978; BAZAAR</div>
                        </div>
                        <div class="replay-hud" id="replayHudA"></div>
                    </div>
                </div>
                <div id="replayAiBoard" class="replay-col" style="display:none;">
                    <div class="replay-board-label" id="replayLabelB">Ernie</div>
                    <div class="replay-col-body">
                        <div class="replay-board-wrap">
                            <canvas id="replayAiCanvas"></canvas>
                            <div class="replay-bazaar-badge" id="replayBazaarB" style="display:none;">&#127978; BAZAAR</div>
                        </div>
                        <div class="replay-hud" id="replayHudB"></div>
                    </div>
                </div>
            </div>

            <div class="replay-controls">
                <button id="replayPlay" class="bug-btn bug-btn-primary">&#9654; Play</button>
                <button id="replayRestart" class="bug-btn">&#9198; Restart</button>
                <input id="replaySeek" class="replay-seek" type="range" min="0" max="0" value="0">
                <span id="replayTick" class="replay-tick">0 / 0</span>
                <label class="replay-speed">Speed
                    <select id="replaySpeed">
                        <option value="0.5">0.5&times;</option>
                        <option value="1" selected>1&times;</option>
                        <option value="2">2&times;</option>
                        <option value="4">4&times;</option>
                        <option value="8">8&times;</option>
                    </select>
                </label>
            </div>

            <!-- Debug controls (?debug=1): single-step, jump-to-tick, the raw input
                 stream at the current tick, and copy-state. -->
            <div id="replayDebug" class="replay-debug" style="display:none;">
                <div class="replay-debug-row">
                    <button id="replayStep" class="bug-btn">&#9197; Step</button>
                    <label class="replay-jump">Tick
                        <input id="replayJump" type="number" min="0" value="0" class="replay-jump-input">
                    </label>
                    <button id="replayGo" class="bug-btn">Go</button>
                    <button id="replayCopy" class="bug-btn">Copy state</button>
                </div>
                <div class="replay-debug-inputs">
                    <span class="rd-h">Inputs @ tick <span id="replayDebugTick">0</span>:</span>
                    <span id="replayDebugInputs" class="rd-inputs">&mdash;</span>
                </div>
            </div>

            <!-- Weapon event log: scrolls "<player> launched <weapon>" as launches
                 fire during playback (online matches; hidden for practice). -->
            <div id="replayEventLog" class="replay-eventlog" style="display:none;">
                <div class="rel-head">Weapon log</div>
                <div class="rel-body" id="replayEventLogBody"></div>
            </div>

            <div id="replayMeta" class="replay-meta"></div>
            <div class="replay-foot"><a href="/www/">&larr; Back to BattleTris</a></div>
        </div>
    </div>

    <script type="module" src="replay.js"></script>
</body>
</html>
