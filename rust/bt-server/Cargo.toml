[package]
name = "bt-server"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "BattleTris matchmaking + WebRTC signaling + TrueSkill rating server."

[[bin]]
name = "bt-server"
path = "src/main.rs"

[dependencies]
bt-trueskill = { path = "../bt-trueskill" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "io-util", "time"] }
tokio-tungstenite = "0.21"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
