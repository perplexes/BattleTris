# Region bots for BattleTris — a separate fly app whose machines each run one
# headless bt-bot that connects to the main `battletris` app over the private
# 6PN network and plays real authoritative matches. TWO process groups so every
# region hosts both personas: `bert` (aggressive — strong eval + smart weapons)
# and `ernie` (easy-going — faithful placement, no weapons). The bot reads
# FLY_PROCESS_GROUP for its persona + FLY_REGION for its city, so one image yields
# e.g. Tokyo-Bert and Tokyo-Ernie per region.
#
# Deploy + place one of each persona per region:
#   fly deploy -c fly.bots.toml --dockerfile Dockerfile.bot --remote-only
#   fly scale count bert=1 ernie=1 --region nrt,lhr,gru,syd,sjc -a battletris-bots
#
# Requires the SAME BT_JWT_SECRET as the server so the bots' self-minted tokens
# verify:  fly secrets set BT_JWT_SECRET=<value> -a battletris-bots
app = "battletris-bots"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.bot"

# Two personas, same image; the bot reads FLY_PROCESS_GROUP ("bert"/"ernie").
[processes]
  bert = "/app/bt-bot"
  ernie = "/app/bt-bot"

[env]
  # The server over fly's private network (plaintext ws, real cross-geo latency).
  BT_BOT_WS = "ws://battletris.internal:8080/ws"

# A worker: no [http_service] / [[services]] — the bot only dials OUT, so there's
# nothing to serve. fly keeps the machine running and restarts it if it exits.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
