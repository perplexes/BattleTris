\* KeyframeRestores OFF: a delivered keyframe (or the reattach keyframe) never
\* reconciles a drifted client -> ResyncConvergence violated.
CONSTANTS
    MaxSeq = 4
    MaxChan = 2
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
    LeaveNeedsAuth = TRUE
    DefensiveReLeave = TRUE
    KeyframeRestores = FALSE
    ResyncOnlyWhenDrifted = TRUE
    EventsNotReplayed = TRUE
    ResyncReadOnly = TRUE
INIT Init
NEXT Next
INVARIANT ResyncConvergence
