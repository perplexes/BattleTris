\* Generator: a cross-player event is applied LATE (drifting the client), then a
\* resync keyframe restores it — exercises the hash-mismatch detector + restore path.
\* All knobs at their SHIPPED values.
CONSTANTS
    MaxSeq = 4
    MaxChan = 3
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
INIT Init
NEXT Next
INVARIANT NotEventThenResync
