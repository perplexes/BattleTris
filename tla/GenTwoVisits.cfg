\* Generator: the server ENTERS the bazaar at least twice in one trace (a multi-visit
\* schedule — enter, leave via a delivered L, re-enter). Exercises the harness across
\* repeated bazaar entries/exits. All knobs shipped.
CONSTANTS
    MaxSeq = 6
    MaxChan = 3
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
INIT Init
NEXT Next
INVARIANT NotTwoVisits
