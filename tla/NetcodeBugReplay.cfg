\* EventsNotReplayed OFF: a keyframe restore re-applies an already-applied event
\* on top of the keyframe that already contains it -> EventDeliveryAccounted violated.
CONSTANTS
    MaxSeq = 4
    MaxChan = 2
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
    LeaveNeedsAuth = TRUE
    DefensiveReLeave = TRUE
    KeyframeRestores = TRUE
    ResyncOnlyWhenDrifted = TRUE
    EventsNotReplayed = FALSE
    ResyncReadOnly = TRUE
INIT Init
NEXT Next
INVARIANT EventDeliveryAccounted
