\* Generator: the SNAP-BACK path — drive the server's ack up, disconnect, then
\* reconnect with a fresh seq so reset_ack (the fix) must drop the ack baseline to 0.
\* The trap fires only once ackAtReconnect > 0 (the server had really acked inputs).
CONSTANTS
    MaxSeq = 4
    MaxChan = 3
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
INIT Init
NEXT Next
INVARIANT NotReconnectedWithHistory
