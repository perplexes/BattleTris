\* server enters the bazaar -> LeaveOnlyWhenReal violated (the predicted-leave freeze).
CONSTANTS
    MaxSeq = 4
    MaxChan = 2
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
    LeaveNeedsAuth = FALSE
INIT Init
NEXT Next
INVARIANT LeaveOnlyWhenReal
