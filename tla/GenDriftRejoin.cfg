\* Generator: the client reconnects WHILE drifted (a late-applied event never got
\* resynced before the disconnect) — exercises the reattach keyframe restoring a
\* drifted client, not just a consistent one. All knobs at their SHIPPED values.
CONSTANTS
    MaxSeq = 4
    MaxChan = 3
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
INIT Init
NEXT Next
INVARIANT NotDriftRejoin
