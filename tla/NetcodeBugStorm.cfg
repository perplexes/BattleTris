\* ResyncOnlyWhenDrifted OFF: the client can request a resync while already
\* consistent -> NoResyncStorm violated.
CONSTANTS
    MaxSeq = 4
    MaxChan = 2
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
    LeaveNeedsAuth = TRUE
    DefensiveReLeave = TRUE
    KeyframeRestores = TRUE
    ResyncOnlyWhenDrifted = FALSE
    EventsNotReplayed = TRUE
    ResyncReadOnly = TRUE
INIT Init
NEXT Next
INVARIANT NoResyncStorm
