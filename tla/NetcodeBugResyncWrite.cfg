\* ResyncReadOnly OFF: a resync grant mutates server sim state instead of only
\* raising the keyframe flag -> ResultIndependence violated.
CONSTANTS
    MaxSeq = 4
    MaxChan = 2
    AckOnBarrierReject = TRUE
    ResetAckOnReattach = TRUE
    LeaveNeedsAuth = TRUE
    DefensiveReLeave = TRUE
    KeyframeRestores = TRUE
    ResyncOnlyWhenDrifted = TRUE
    EventsNotReplayed = TRUE
    ResyncReadOnly = FALSE
INIT Init
NEXT Next
INVARIANT ResultIndependence
