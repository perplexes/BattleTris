\* Bazaar fix OFF: a barrier-crossing input is never acked -> NoDeadlock violated.
CONSTANTS
    MaxSeq = 4
    MaxChan = 2
    AckOnBarrierReject = FALSE
    ResetAckOnReattach = TRUE
    LeaveNeedsAuth = TRUE
    DefensiveReLeave = TRUE
    KeyframeRestores = TRUE
    ResyncOnlyWhenDrifted = TRUE
    EventsNotReplayed = TRUE
    ResyncReadOnly = TRUE
INIT Init
NEXT Next
INVARIANT NoDeadlock
